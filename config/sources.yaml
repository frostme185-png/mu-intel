# Bảng phân loại nguồn tin theo độ tin cậy (tier 0-4).
# Khung tham khảo: The False 9 reliability guide + manutdupdates.com (điều chỉnh cho MUFC).
# Xem giải thích đầy đủ từng tier trong CLAUDE.md.
#
# QUAN TRỌNG: chỉ RSS feed đánh dấu "verified: true" đã được xác nhận hoạt động
# (kiểm tra ngày 2026-07-06 bằng cách fetch trực tiếp URL và xem nội dung XML trả về).
# Các feed đánh dấu "verified: false" nghĩa là không tìm được RSS thật cho nguồn đó
# (paywall, chỉ publish qua X, hoặc site không có RSS) — xem comment từng dòng.
#
# "scope" cho collect_news.py biết feed đã lọc riêng MUFC chưa:
#   - "team": feed chỉ chứa tin MUFC (tag riêng, hoặc cả nguồn chỉ nói về MUFC) -> giữ nguyên
#   - "general": feed tổng nhiều CLB (không lọc riêng) -> phải chạy qua bộ lọc từ khoá
#     liên quan Man United trước khi đưa vào report, tránh lẫn tin CLB khác

tier_0:
  description: "Nguồn chính thức tuyệt đối — luôn đúng, không cần cross-reference"
  sources:
    - name: "Manchester United official"
      type: "official"
      website: "https://www.manutd.com/en/news"
      rss: null # đã kiểm tra: club không public RSS cho /news (không có <link rss> trên trang, các path đoán như /rss, /rssfeed, /feeds/news đều 404) - cần scrape hoặc theo dõi thủ công
      verified: false

tier_1:
  description: "Gần như không thể tranh cãi — nếu họ nói thì gần như chắc chắn đúng"
  sources:
    - name: "BBC Sport - Manchester United"
      type: "outlet"
      website: "https://www.bbc.co.uk/sport/football/teams/manchester-united"
      rss: "https://feeds.bbci.co.uk/sport/football/teams/manchester-united/rss.xml"
      verified: true
      scope: "team"
    - name: "David Ornstein / The Athletic"
      type: "journalist"
      website: "https://theathletic.com"
      rss: null # The Athletic paywalled, không có public RSS - cần theo dõi qua X hoặc thủ công
      verified: false
    - name: "Fabrizio Romano"
      type: "journalist"
      website: "https://www.fabrizioromano.com"
      rss: null # đã kiểm tra: fabrizioromano.com không trả RSS (406, không có link feed), publish chủ yếu qua X/Substack - cần theo dõi thủ công
      verified: false

tier_2:
  description: "Có nguồn tin thật nhưng vẫn có thể sai - ≥2 nguồn tier này trùng nhau là tín hiệu mạnh"
  sources:
    - name: "Manchester Evening News - MUFC"
      type: "outlet"
      website: "https://www.manchestereveningnews.co.uk"
      rss: "https://www.manchestereveningnews.co.uk/all-about/manchester-united-fc/rss.xml" # feed theo tag MUFC riêng, đã fetch xác nhận có item mới (Jul 2026), không phải feed tổng
      verified: true
      scope: "team"
    - name: "Mirror Football - Man United"
      type: "outlet"
      website: "https://www.mirror.co.uk/sport/football"
      rss: "https://www.mirror.co.uk/all-about/manchester-united-fc/rss.xml" # feed theo tag MUFC riêng (tương tự MEN, cùng nền Reach plc), đã fetch xác nhận có item mới (Jul 2026)
      verified: true
      scope: "team"
    - name: "The Guardian - Manchester United"
      type: "outlet"
      website: "https://www.theguardian.com/football/manchester-united"
      rss: "https://www.theguardian.com/football/manchester-united/rss" # feed theo tag MUFC riêng, đã fetch xác nhận có item mới (Jul 2026) và item đầu tiên đã là tin MUFC thật
      verified: true
      scope: "team"

tier_3:
  description: "Không đáng tin nếu đứng một mình, thiên clickbait"
  sources:
    - name: "Caught Offside"
      type: "aggregator"
      website: "https://www.caughtoffside.com"
      rss: "https://www.caughtoffside.com/feed/" # feed tổng (không lọc riêng MUFC) - đã thử tag /tag/manchester-united/feed/ nhưng feed đó không cập nhật từ 2026-02-18 nên dùng feed tổng, item MUFC vẫn xuất hiện lẫn trong đó
      verified: true
      scope: "general"
    - name: "Football Insider"
      type: "aggregator"
      website: "https://www.footballinsider247.com"
      rss: "https://www.footballinsider247.com/feed/" # feed tổng (không lọc riêng MUFC), đã fetch xác nhận có item mới (Jul 2026); không tìm được feed riêng theo team
      verified: true
      scope: "general"
    - name: "TEAMtalk"
      type: "aggregator"
      website: "https://www.teamtalk.com"
      rss: null # đã thử nhiều path (/feed, /rss.xml, /manchester-united/feed, /rss/manchester-united...) đều 404 hoặc redirect về trang bài viết thường, site không có RSS công khai
      verified: false
      scope: "general"

tier_4:
  description: "Không đáng tin, câu traffic - vẫn thu thập vì đôi khi rumor xuất hiện sớm nhất ở đây"
  sources:
    - name: "r/reddevils"
      type: "forum"
      website: "https://www.reddit.com/r/reddevils"
      rss: "https://www.reddit.com/r/reddevils/.rss"
      verified: true # đã fetch xác nhận trả về Atom feed hợp lệ với entry mới (Jul 2026); lưu ý Reddit rate-limit khá gắt (429) theo IP, script thu thập nên có retry/backoff
      scope: "team"

# Nguồn mới phát hiện trong quá trình thu thập mà không có trong bảng này
# -> mặc định xếp vào tier_4 cho đến khi được review thủ công và thêm vào đây.
default_tier_for_unknown_source: 4
